<!doctype html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>%WEB_TITLE%</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript> You need to enable JavaScript to run this app. </noscript>
    <div id="root"></div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          if (!window.__DEV__) {
            // Only arm the reload for genuine updates, not the first-ever install
            // (first install also fires controllerchange via clientsClaim).
            var hadController = !!navigator.serviceWorker.controller;
            navigator.serviceWorker.register("./service-worker.js").then(function (reg) {
              reg.update(); // force an immediate update check on load
              document.addEventListener("visibilitychange", function () {
                // covers resume-from-background of the installed standalone PWA
                if (document.visibilityState === "visible") reg.update();
              });
            });
            if (hadController) {
              var reloading = false;
              navigator.serviceWorker.addEventListener("controllerchange", function () {
                if (!reloading) {
                  reloading = true;
                  window.location.reload();
                }
              });
            }
          }
        });
      }
    </script>
  </body>
</html>
